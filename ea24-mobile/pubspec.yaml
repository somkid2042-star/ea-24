name: ea24_mobile
description: "EA24 Mobile — Trading Control Center"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # === Core Utilities ===
  http: ^1.2.2
  shared_preferences: ^2.0.8

  # === UI Dependencies ===
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.1
  url_launcher: ^6.0.12

  # === Required by dependencies or specific widgets ===
  path_provider: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.1.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic
