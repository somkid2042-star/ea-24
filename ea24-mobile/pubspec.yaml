name: ea24_mobile
description: "EA24 Mobile — Trading Control Center"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # === UI Dependencies (from code_ui) ===
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  font_awesome_flutter: ^10.9.1
  badges: ^3.1.2
  carousel_slider: ^5.1.1
  cached_network_image: ^3.4.1
  dotted_line: ^3.2.3
  expandable: ^5.0.1
  flip_card: ^0.7.0
  flutter_svg: ^2.2.0
  flutter_spinkit: ^5.2.1
  flutter_rating_bar: ^4.0.1
  flutter_chat_bubble: ^2.0.0
  flutter_html: ^3.0.0
  flutter_countdown_timer: ^4.1.0
  google_fonts: ^6.2.1
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  route_transitions: ^2.0.1
  fluttertoast: ^8.2.8
  url_launcher: ^6.0.12
  timeline_list: ^0.0.3
  timeline_tile: ^2.0.0
  confetti: ^0.8.0
  scratcher: ^2.5.0

  # === Navigation & State ===
  go_router: ^14.2.3
  provider: ^6.0.0
  one_context: ^4.0.0
  shared_value: ^3.0.0
  shared_preferences: ^2.0.8

  # === Core Utils ===
  http: ^1.2.2
  intl: ^0.19.0
  clipboard: ^0.1.3
  path: ^1.9.1
  connectivity_plus: ^6.1.4
  logging: ^1.0.2
  validators: ^3.0.0
  dropdown_search: ^6.0.2
  flutter_typeahead: ^5.2.0
  flutter_math_fork: ^0.7.4
  json_annotation: ^4.1.0
  package_info_plus: ^4.1.0
  permission_handler: ^11.3.1

  # === Auth/Social UI ===
  crypto: ^3.0.6
  intl_phone_number_input: ^0.7.4
  google_sign_in: ^6.1.0
  flutter_facebook_auth: ^7.0.1
  sign_in_with_apple: ^6.1.1
  firebase_core: ^3.15.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  flutter_downloader: ^1.12.0
  google_maps_flutter: ^2.10.0
  geolocator: ^10.1.1
  google_maps_place_picker_mb: ^3.1.0
  video_thumbnail: ^0.5.3
  phonepe_payment_sdk: ^2.0.3

  # === EA24 Cookie Fetcher Dependencies ===
  web_socket_channel: ^3.0.1
  desktop_webview_window: ^0.2.3
  awesome_notifications: ^0.10.0
  gap: ^3.0.1

  # === Media (needed by code_ui screens) ===
  video_player: ^2.10.0
  chewie: ^1.7.5
  youtube_player_flutter: ^9.1.2
  image_picker: ^1.1.2
  file_picker: ^10.2.0

  # === Store ===
  store_box: ^2.0.0
  path_provider: ^2.0.11
  share_plus: ^10.0.2

  # === Webview (for code_ui common_webview) ===
  webview_flutter: ^4.13.0
  webview_flutter_android: 4.8.0
  webview_flutter_wkwebview: ^3.22.0

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.1.4
  json_serializable: ^6.2.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/htmls/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: PublicSansSerif
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf
        - asset: assets/fonts/PublicSans-Bold.ttf
        - asset: assets/fonts/PublicSans-Medium.ttf
        - asset: assets/fonts/PublicSans-SemiBold.ttf
        - asset: assets/fonts/PublicSans-Italic.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Italic.ttf
        - asset: assets/fonts/Inter-VariableFont.ttf
          style: italic
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic
    - family: Exo
      fonts:
        - asset: fonts/Exo-Black.ttf
          weight: 900
    - family: Satoshi
      fonts:
        - asset: fonts/Satoshi.ttf
        - asset: fonts/Satoshi-Light.ttf
          weight: 300
        - asset: fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: fonts/Satoshi-Bold.ttf
        - asset: fonts/Satoshi-Black.ttf
          weight: 900
