name: active_ecommerce_cms_demo_app
description: "A new Flutter project."

publish_to: 'none'

version: 5.6.0+9

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  confetti: ^0.8.0
  flutter:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  font_awesome_flutter: ^10.9.1
  info_getter: ^1.0.0
  scratcher: ^2.5.0
  store_box: ^2.0.0
  video_player: ^2.10.0
  video_thumbnail: ^0.5.6
  youtube_player_flutter: ^9.1.2

  phonepe_payment_sdk: ^3.0.1
  badges: ^3.1.2
  crypto: ^3.0.6
  clipboard: ^0.1.3
  carousel_slider: ^5.1.1
  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1
  dotted_line: ^3.2.3
  dropdown_search: ^6.0.2
  expandable: ^5.0.1
  flip_card: ^0.7.0
  file_picker: ^10.2.0
  flutter_svg: ^2.2.0
  flutter_spinkit: ^5.2.1
  flutter_math_fork: ^0.7.4
  flutter_typeahead: ^5.2.0
  flutter_rating_bar: ^4.0.1
  flutter_chat_bubble: ^2.0.0
  flutter_html: ^3.0.0
  firebase_core: ^3.15.1
  firebase_messaging: ^15.1.5
  flutter_downloader: ^1.12.0
  flutter_facebook_auth: ^7.0.1
  flutter_countdown_timer: ^4.1.0
  flutter_local_notifications: ^18.0.1
  go_router: ^14.2.3
  google_fonts: ^6.2.1
  google_sign_in: ^6.1.0
  google_maps_flutter: ^2.10.0
  http: ^1.2.2
  image_picker: ^1.1.2
  intl_phone_number_input: ^0.7.4
  json_annotation: ^4.1.0
  logging: ^1.0.2
  one_context: ^4.0.0
  provider: ^6.0.0
  photo_view: ^0.15.0
  path_provider: ^2.0.11
  permission_handler: ^11.3.1
  rename: ^3.0.2
  route_transitions: ^2.0.1
  shimmer: ^3.0.0
  shared_value: ^3.0.0
  share_plus: ^10.0.2
  shared_preferences: ^2.0.8
  sign_in_with_apple: ^6.1.1
  fluttertoast: ^8.2.8
  url_launcher: ^6.0.12
  timeline_list: ^0.0.3
  timeline_tile: ^2.0.0
  validators: ^3.0.0
  webview_flutter_android: 4.8.0
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: ^3.22.0
  chewie: ^1.7.5
  package_info_plus: ^4.1.0
  path: ^1.9.1

dependency_overrides:
  google_maps_place_picker_mb: ^3.1.2
  intl: ^0.19.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.4
  json_serializable: ^6.2.0
  flutter_launcher_icons: ^0.14.1
  change_app_package_name: ^1.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/htmls/
    - assets/fonts/

  fonts:
    - family: PublicSansSerif
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf
        - asset: assets/fonts/PublicSans-Bold.ttf
        - asset: assets/fonts/PublicSans-Medium.ttf
        - asset: assets/fonts/PublicSans-SemiBold.ttf
        - asset: assets/fonts/PublicSans-Italic.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Italic.ttf
        - asset: assets/fonts/Inter-VariableFont.ttf
          style: italic
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic
