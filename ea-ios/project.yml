name: EA24
options:
  bundleIdPrefix: com.ea24
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    DEVELOPMENT_TEAM: "YN46A3R8WU"
    SWIFT_VERSION: "6.0"
    SUPPORTS_MACCATALYST: false
    GENERATE_INFOPLIST_FILE: false

targets:
  EA24:
    type: application
    platform: iOS
    sources:
      - EA24
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ea24.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        INFOPLIST_KEY_NSAppTransportSecurity: "<dict><key>NSAllowsArbitraryLoads</key><true/></dict>"
        INFOPLIST_KEY_UIAppFonts: 
          - "CamingoCode-Regular.ttf"
          - "CamingoCode-Bold.ttf"
          - "CamingoCode-Italic.ttf"
          - "CamingoCode-BoldItalic.ttf"
    info:
      path: EA24/Info.plist
    dependencies:
      - target: EA24WidgetsExtension

  EA24WidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - EA24Widgets
    info:
      path: EA24Widgets/Info.plist
      properties:
        CFBundleDisplayName: "EA24 Widgets"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ea24.app.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        SWIFT_EMIT_LOC_STRINGS: true
        SKIP_INSTALL: true
    dependencies: []
