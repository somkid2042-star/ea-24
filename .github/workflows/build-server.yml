name: Build EA-Server (Windows)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Build React Frontend (required for rust-embed) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: ./ea-client
        run: npm install

      - name: Build React Frontend
        working-directory: ./ea-client
        run: npm run build

      # ── Step 2: Build Rust Server ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('ea-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-openssl-static-v3
          restore-keys: ${{ runner.os }}-vcpkg-openssl-static-v3

      - name: Install OpenSSL (static linking for SQLCipher)
        run: |
          foreach ($old in @("x64-windows", "x64-windows-static-md")) {
            if (Test-Path "C:\vcpkg\installed\$old") {
              Write-Host "Removing old $old triplet..."
              Remove-Item -Recurse -Force "C:\vcpkg\installed\$old"
            }
          }
          vcpkg install openssl:x64-windows-static
          $base = "C:\vcpkg\installed\x64-windows-static"
          echo "OPENSSL_DIR=$base" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$base\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$base\include" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Build release
        working-directory: ./ea-server
        run: cargo build --release

      # ── Step 3: Upload Artifacts ──
      - name: Upload ea-server.exe
        uses: actions/upload-artifact@v4
        with:
          name: ea-server-windows
          path: ea-server/target/release/ea-server.exe

      # ── Step 4: Create GitHub Release (only on tag push) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ea-server/target/release/ea-server.exe
          generate_release_notes: true
