name: Build EA-Server (Windows)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ea-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('ea-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-openssl-static-md-v2
          restore-keys: ${{ runner.os }}-vcpkg-openssl-static-md-

      - name: Install OpenSSL (static linking for SQLCipher)
        run: |
          # Remove old dynamic triplet if it exists from cached data
          if (Test-Path "C:\vcpkg\installed\x64-windows") {
            Write-Host "Removing old x64-windows dynamic triplet..."
            Remove-Item -Recurse -Force "C:\vcpkg\installed\x64-windows"
          }
          vcpkg install openssl:x64-windows-static-md
          $base = "C:\vcpkg\installed\x64-windows-static-md"
          echo "OPENSSL_DIR=$base" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$base\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$base\include" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV
          Write-Host "=== OpenSSL lib files ==="
          Get-ChildItem "$base\lib" -Filter "*.lib" | ForEach-Object { Write-Host $_.Name }

      - name: Build release
        run: |
          cargo clean
          cargo build --release

      - name: Compile InnoSetup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ea-server-windows
          path: |
            ea-server/target/release/ea-server.exe
            ea-server/target/release/ea-server-installer.exe

      # ── Auto-create GitHub Release when pushing a tag ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ea-server/target/release/ea-server.exe
            ea-server/target/release/ea-server-installer.exe
          generate_release_notes: true
