name: Build EA-Server (Ubuntu)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Install system dependencies ──
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      # ── Step 2: Build React Frontend (required for rust-embed) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: ./ea-client
        run: npm install

      - name: Build React Frontend
        working-directory: ./ea-client
        run: npm run build

      # ── Step 3: Build Rust Server ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ea-server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ea-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        working-directory: ./ea-server
        run: cargo build --release

      # ── Step 4: Upload Artifacts ──
      - name: Upload ea-server binary
        uses: actions/upload-artifact@v4
        with:
          name: ea-server-linux
          path: ea-server/target/release/ea-server

      # ── Step 5: Create GitHub Release (only on tag push) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ea-server/target/release/ea-server
          generate_release_notes: true
