name: Build Desktop Client

on:
  push:
    branches:
      - main
    paths:
      - "ea-client/**"
      - ".github/workflows/build-client.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('ea-client/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-client-

      - name: Install Frontend Dependencies
        working-directory: ./ea-client
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./ea-client"
          args: "--target x86_64-pc-windows-msvc"
          tagName: app-v__VERSION__
          releaseName: "EA-24 Desktop App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
